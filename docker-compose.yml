services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
      - "9090:9090"
      - "3100:3100"
      - "3200:3200"
      - "3500:3500"
    volumes:
      - lgtm-data:/data
      - ./grafana/provisioning:/otel-lgtm/grafana/conf/provisioning:ro
    environment:
      - TZ=Europe/Copenhagen
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/otel-lgtm/grafana/conf/provisioning/dashboards/openwrt-overview.json
      - GF_USERS_DEFAULT_THEME=dark
      - ENABLE_LOGS_GRAFANA=true
      - ENABLE_LOGS_LOKI=false
      - ENABLE_LOGS_PROMETHEUS=false
      - ENABLE_LOGS_TEMPO=false
    restart: unless-stopped
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "1234:12345"            # Alloy UI (http://localhost:12345)
      - "${SYSLOG_PORT:-514}:514/udp"  # Syslog receiver UDP
      - "${SYSLOG_PORT:-514}:514/tcp"  # Syslog receiver TCP
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    command: run /etc/alloy/config.alloy
    environment:
      - ROUTER_IP=${ROUTER_IP:-192.168.0.1}
      - ROUTER_NAME=${ROUTER_NAME:-openwrt}
      - ROUTER_METRICS_PORT=${ROUTER_METRICS_PORT:-9100}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-30s}
    depends_on:
      otel-lgtm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lgtm-data:
    driver: local
